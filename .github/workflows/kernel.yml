- name: Inject Shadow Drivers & Apply Patches
        run: |
          # 1. Create the driver directory and build files
          mkdir -p drivers/shadow_drivers
          echo "obj-y += tee_spy.o" > drivers/shadow_drivers/Makefile
          echo "obj-y += tee_spy.o" > drivers/shadow_drivers/Kbuild

          # 2. VERY CAREFUL Root Makefile Injection
          # Instead of appending, we replace the line to ensure parentheses remain balanced
          # This avoids the 'unterminated call to function patsubst' error
          sed -i 's/^drivers-y[[:space:]]*:=/drivers-y := shadow_drivers\/ /' Makefile
          
          # 3. Targeted C-Header Patches
          # We use specific line starts to ensure we don't double-patch or corrupt files
          
          # Fix tee_shm.c: Add header only if not already there
          grep -q "linux/types.h" drivers/tee/tee_shm.c || sed -i '1i #include <linux/types.h>' drivers/tee/tee_shm.c
          
          # Fix qseecom.c: Comment out the problematic intercept call
          # We use a very specific match for the function name we saw in your logs
          sed -i 's/evo_spy_intercept/\/\/ evo_spy_intercept/g' drivers/misc/qseecom.c
          
          # Fix irq-gic-v3.c: Add Oplus profile header
          grep -q "oplus_wakelock_profiler.h" drivers/irqchip/irq-gic-v3.c || sed -i '1i #include <soc/oplus/oplus_wakelock_profiler.h>' drivers/irqchip/irq-gic-v3.c

      - name: Build Kernel (OnePlus 9R)
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Kona is the platform for the 9R
          make O=out vendor/kona-perf_defconfig
          
          # Use a safer method to append to .config
          # We check if the config exists before appending to avoid duplicates
          grep -q "CONFIG_EVO_TEE_SPY" out/.config || echo "CONFIG_EVO_TEE_SPY=y" >> out/.config
          
          # Resolve dependencies silently
          make O=out olddefconfig
          
          # Build with Clang and ignore vendor-specific warnings
          make -j$(nproc) O=out \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-return-type -Wno-unused-variable" \
            2>&1 | tee build.log
