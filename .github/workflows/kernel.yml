name: Build TEE Bypass Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          # Including gcc-aarch64-linux-gnu to prevent the "not found" compiler errors
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm python3 gcc-aarch64-linux-gnu

      - name: Clone Kernel Source
        run: |
          # Pulling the Evolution X sm8250 kernel source (kona) for the 9R
          git clone --depth 1 https://github.com/Evolution-X-Devices/kernel_oneplus_sm8250.git kernel_source
          # Move everything to the root so the build paths are standard
          mv kernel_source/* .
          mv kernel_source/.* . 2>/dev/null || true

      - name: Inject Shadow Drivers & Apply Patches
        run: |
          # 1. Create the shadow_drivers directory and build files
          mkdir -p drivers/shadow_drivers
          echo "obj-y += tee_spy.o" > drivers/shadow_drivers/Makefile
          echo "obj-y += tee_spy.o" > drivers/shadow_drivers/Kbuild

          # 2. ULTRA-SAFE Root Makefile Injection
          # This specifically targets the drivers-y assignment to avoid breaking patsubst logic
          sed -i 's/^drivers-y[[:space:]]*:=/drivers-y := shadow_drivers\/ /' Makefile
          
          # 3. Targeted C-Header & Logic Patches
          # We check for existing headers first to prevent double-patching errors
          grep -q "linux/types.h" drivers/tee/tee_shm.c || sed -i '1i #include <linux/types.h>' drivers/tee/tee_shm.c
          
          # Fixing the intercept call error in qseecom.c
          sed -i 's/evo_spy_intercept/\/\/ evo_spy_intercept/g' drivers/misc/qseecom.c
          
          # Fix platform ID/wakelock header issues in irqchip
          grep -q "oplus_wakelock_profiler.h" drivers/irqchip/irq-gic-v3.c || sed -i '1i #include <soc/oplus/oplus_wakelock_profiler.h>' drivers/irqchip/irq-gic-v3.c

      - name: Build Kernel (OnePlus 9R)
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # Load the base kona-perf_defconfig for the 9R
          make O=out vendor/kona-perf_defconfig
          
          # Inject the TEE Bypass config and update .config silently
          grep -q "CONFIG_EVO_TEE_SPY" out/.config || echo "CONFIG_EVO_TEE_SPY=y" >> out/.config
          make O=out olddefconfig
          
          # Build using LLVM/Clang with flags to suppress vendor code warnings
          make -j$(nproc) O=out \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-return-type -Wno-unused-variable" \
            2>&1 | tee build.log

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          # Fallback check to ensure the Image is found regardless of the output path
          [ -f out/arch/arm64/boot/Image ] && cp out/arch/arm64/boot/Image AnyKernel3/ || cp arch/arm64/boot/Image AnyKernel3/
          cd AnyKernel3
          # Set the device name to lemonades (OnePlus 9R)
          sed -i 's/device.name1=maguro/device.name1=lemonades/g' anykernel.sh
          zip -r ../Ok-TEE-Bypass-Kernel.zip ./*

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: TEE-Bypass-Build
          path: |
            Ok-TEE-Bypass-Kernel.zip
            build.log
