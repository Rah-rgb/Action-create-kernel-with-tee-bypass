name: Build TEE Bypass Kernel
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Workflow
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          # Standard tools for OnePlus 9R kernel development
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang lld llvm python3 gcc-aarch64-linux-gnu

      - name: Clone Kernel Source
        run: |
          # Cloning Evolution X sm8250 source for the 9R
          git clone --depth 1 https://github.com/Evolution-X-Devices/kernel_oneplus_sm8250.git kernel_source
          mv kernel_source/* .
          mv kernel_source/.* . 2>/dev/null || true

      - name: Inject Shadow Drivers & Apply Patches
        run: |
          # 1. Create the shadow_drivers directory and required files
          mkdir -p drivers/shadow_drivers
          echo "obj-y += tee_spy.o" > drivers/shadow_drivers/Makefile
          echo "obj-y += tee_spy.o" > drivers/shadow_drivers/Kbuild
          
          # 2. ULTRA-SAFE Root Makefile Injection
          # We use a cleaner method to add the directory to the build core
          # This avoids the 'unterminated call to function patsubst' error
          sed -i 's/^drivers-y[[:space:]]*:=/drivers-y := drivers\/shadow_drivers\/ /' Makefile

          # 3. Targeted C-Header & Logic Patches
          # Fix tee_shm.c: Add missing types header
          grep -q "linux/types.h" drivers/tee/tee_shm.c || sed -i '1i #include <linux/types.h>' drivers/tee/tee_shm.c
          
          # Fix qseecom.c: Bypass the intercept call causing errors on 9R
          sed -i 's/evo_spy_intercept/\/\/ evo_spy_intercept/g' drivers/misc/qseecom.c
          
          # Fix irq-gic-v3.c: Add Oplus wakelock header
          grep -q "oplus_wakelock_profiler.h" drivers/irqchip/irq-gic-v3.c || sed -i '1i #include <soc/oplus/oplus_wakelock_profiler.h>' drivers/irqchip/irq-gic-v3.c

      - name: Build Kernel (OnePlus 9R)
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          
          # 1. Initialize the Kona (OnePlus 9R) config
          make O=out vendor/kona-perf_defconfig
          
          # 2. Force enable the TEE Spy bypass driver
          echo "CONFIG_EVO_TEE_SPY=y" >> out/.config
          make O=out olddefconfig
          
          # 3. Compile with Clang and ignore vendor code syntax warnings
          make -j$(nproc) O=out \
            CC=clang LD=ld.lld AR=llvm-ar NM=llvm-nm \
            OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
            KCFLAGS="-Wno-error -Wno-implicit-function-declaration -Wno-return-type -Wno-unused-variable" \
            2>&1 | tee build.log

      - name: Package with AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git
          # Robust search for the built Image to ensure packaging succeeds
          IMAGE_PATH=$(find out/arch/arm64/boot/ -name "Image" | head -n 1)
          if [ -z "$IMAGE_PATH" ]; then
            echo "❌ ERROR: Kernel Image not found!"
            exit 1
          fi
          cp "$IMAGE_PATH" AnyKernel3/
          cd AnyKernel3
          # Configure for the OnePlus 9R (lemonades)
          sed -i 's/device.name1=maguro/device.name1=lemonades/g' anykernel.sh
          zip -r ../Ok-TEE-Bypass-9R.zip ./*

      - name: Upload Finished Kernel
        uses: actions/upload-artifact@v4
        with:
          name: TEE-Bypass-Build
          path: |
            Ok-TEE-Bypass-9R.zip
            build.log
